spring.application.name=ShelfAware
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:shelfaware
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.data.web.pageable.max-page-size=100
debug=false
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO
shelfaware.security.jwt-secret=${JWT_SECRET:dev-only-change-this-secret-before-deployment-dev-only-change-this-secret}
shelfaware.security.jwt-issuer=${JWT_ISSUER:shelfaware}
shelfaware.security.jwt-expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
shelfaware.external.open-library.base-url=${OPEN_LIBRARY_BASE_URL:https://openlibrary.org}
shelfaware.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
shelfaware.demo.enabled=${DEMO_MODE_ENABLED:true}
server.port=${PORT:8080}
